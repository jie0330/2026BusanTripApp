<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2026''釜山Trip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg-color: #f7fee7; --summer: #65a30d; --btn-orange: #f97316; }
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: var(--bg-color); color: #334155; }
        
        /* 1. 強制按鈕層級與點擊穿透 */
        .clickable { cursor: pointer !important; pointer-events: auto !important; z-index: 9999 !important; }
        
        /* 2. 天數按鈕樣式強化 */
        .day-active { background-color: #365314 !important; color: white !important; border-color: #365314 !important; }
        .day-inactive { background-color: #d9f99d !important; color: #3f6212 !important; border-color: #bef264 !important; }

        /* 3. 新增按鈕特效 (亮橘色) */
        .add-btn-fixed {
            position: fixed !important; bottom: 32px !important; right: 24px !important;
            background-color: var(--btn-orange) !important; color: white !important;
            width: 64px !important; height: 64px !important; border-radius: 50% !important;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4) !important;
            z-index: 99999 !important; border: 3px solid white !important;
            display: flex !important; align-items: center !important; justify-content: center !important;
            font-size: 32px !important; font-weight: bold !important;
        }

        /* 4. Naver 按鈕樣式強化 (高對比) */
        .btn-naver-transit { background-color: #03c75a !important; color: white !important; font-weight: 800 !important; }
        .btn-naver-spot { background-color: #007aff !important; color: white !important; font-weight: 800 !important; }

        #schedule-map { width: 100%; height: 100%; z-index: 1; border-radius: 24px; }
        .map-wrapper { position: relative; z-index: 5; margin-bottom: 24px; }
        .transit-line::before { content: ''; position: absolute; left: -20px; top: 24px; bottom: -24px; width: 2px; background-image: linear-gradient(to bottom, #a3e635 50%, transparent 50%); background-size: 2px 10px; z-index: 0; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

<div id="app" class="flex flex-col h-full relative">
    <header class="bg-white pt-safe shadow-md border-b-2 border-lime-200 sticky top-0 z-[100]">
        <div class="px-6 pt-4 pb-2 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">釜山Trip 🌿</h1>
            <div class="flex gap-2">
                <button @click="refreshMap" class="clickable text-[11px] bg-lime-100 text-lime-800 px-3 py-1 rounded-full border border-lime-300">↻ 重整地圖</button>
            </div>
        </div>
        
        <div class="flex border-b border-gray-100">
            <button v-for="tab in ['schedule', 'money', 'memo']" :key="tab" @click="currentTab = tab" 
                class="clickable flex-1 py-4 text-sm font-black" 
                :class="currentTab === tab ? 'text-lime-700 border-b-4 border-lime-600' : 'text-gray-400'">
                {{ {schedule:'行程', money:'分帳', memo:'備忘'}[tab] }}
            </button>
        </div>

        <div v-if="currentTab === 'schedule'" class="px-4 py-4 bg-lime-50/50 flex items-center gap-3 overflow-x-auto no-scrollbar relative z-[110]">
             <button v-for="(day, index) in days" :key="index" @click="changeDay(index)" 
                class="clickable flex-shrink-0 px-5 py-2 rounded-xl text-xs font-black border-2 transition-all shadow-sm" 
                :class="currentDayIndex === index ? 'day-active' : 'day-inactive'">
                DAY {{ index }}
            </button>
            <button @click="addDay" class="clickable flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-xl border-2 border-dashed border-lime-400 text-lime-600 bg-white font-bold">+</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 pb-32 relative z-10 bg-lime-50/20">
        
        <div v-if="currentTab === 'schedule'" class="space-y-6">
            <div class="map-wrapper w-full h-52 rounded-3xl overflow-hidden shadow-inner border-2 border-white">
                <div id="schedule-map"></div>
            </div>

            <div class="relative space-y-6 pl-4 border-l-2 border-lime-200 ml-2">
                <div v-for="(event, eIndex) in days[currentDayIndex].events" :key="event.id" class="relative pl-6">
                    <div class="absolute -left-[22px] top-1 z-20 bg-white w-5 h-5 border-2 border-lime-500 rounded-full flex items-center justify-center text-[10px]">
                         {{ event.type === 'transit' ? '✈️' : '📍' }}
                    </div>

                    <div class="p-5 rounded-3xl shadow-sm border-2 border-white bg-white/90">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="font-black text-xs text-lime-600 mb-2 bg-lime-100 inline-block px-2 py-0.5 rounded">{{ event.time }}</div>
                                
                                <div v-if="event.type === 'spot'">
                                    <h3 class="font-black text-lg text-gray-800">{{ event.location }}</h3>
                                    <a :href="'https://map.naver.com/v5/search/' + encodeURIComponent(event.location)" target="_blank" 
                                       class="clickable mt-4 inline-flex items-center text-xs btn-naver-spot px-5 py-2.5 rounded-full shadow-lg">
                                        🗺️ 開啟 Naver Map 搜尋
                                    </a>
                                </div>

                                <div v-else>
                                    <div class="space-y-1 font-bold text-gray-700">
                                        <div class="flex items-center"><span class="bg-gray-100 text-[10px] px-1.5 py-0.5 rounded mr-2">FROM</span> {{ event.origin }}</div>
                                        <div class="flex items-center"><span class="bg-gray-800 text-white text-[10px] px-1.5 py-0.5 rounded mr-2">TO</span> {{ event.destination }}</div>
                                    </div>
                                    <a :href="'https://map.naver.com/v5/directions/' + encodeURIComponent(event.origin) + ',,,' + '/' + encodeURIComponent(event.destination) + ',,,' + '/transit'" 
                                       target="_blank" 
                                       class="clickable mt-4 inline-flex items-center text-xs btn-naver-transit px-5 py-2.5 rounded-full shadow-lg">
                                        🚀 Naver 交通路線導航
                                    </a>
                                </div>
                            </div>
                            <button @click="deleteEvent(eIndex)" class="clickable text-gray-300 hover:text-red-500 text-2xl">×</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <button @click="openAddModal" class="add-btn-fixed clickable">
                +
            </button>
        </div>

        <div v-if="currentTab === 'money'" class="space-y-4">
             <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-lime-200 text-center">
                <div class="text-3xl font-black text-gray-800">₩{{ totalSpentKRW.toLocaleString() }}</div>
                <div class="text-lime-600 font-bold">≈ NT$ {{ Math.round(totalSpentKRW * exchangeRate).toLocaleString() }}</div>
            </div>
            <button @click="showExpenseModal = true" class="clickable w-full bg-lime-600 text-white py-4 rounded-2xl font-black shadow-lg">＋ 新增支出</button>
        </div>
    </main>

    <div v-if="showAddModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[99999] flex items-end justify-center">
        <div class="bg-white w-full max-w-sm p-8 rounded-t-[40px] shadow-2xl pb-10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xl">新增計畫</h3>
                <button @click="showAddModal = false" class="clickable text-3xl text-gray-300">✕</button>
            </div>
            <div class="space-y-4">
                <input v-model="tempEvent.time" type="time" class="w-full bg-gray-100 p-4 rounded-2xl border-none font-bold text-lg">
                <div class="flex bg-gray-100 p-2 rounded-2xl">
                    <button @click="tempEvent.type = 'spot'" :class="tempEvent.type === 'spot' ? 'bg-white shadow-md text-lime-600' : 'text-gray-400'" class="clickable flex-1 py-3 rounded-xl font-black">📍 景點</button>
                    <button @click="tempEvent.type = 'transit'" :class="tempEvent.type === 'transit' ? 'bg-white shadow-md text-gray-700' : 'text-gray-400'" class="clickable flex-1 py-3 rounded-xl font-black">🚆 交通</button>
                </div>
                <div v-if="tempEvent.type === 'spot'">
                    <input v-model="tempEvent.location" placeholder="輸入地點 (例如: 海雲台)" class="w-full bg-gray-100 p-4 rounded-2xl border-none font-bold">
                </div>
                <div v-else class="grid grid-cols-2 gap-3">
                    <input v-model="tempEvent.origin" placeholder="起點" class="bg-gray-100 p-4 rounded-2xl border-none font-bold">
                    <input v-model="tempEvent.destination" placeholder="終點" class="bg-gray-100 p-4 rounded-2xl border-none font-bold">
                </div>
                <button @click="saveEvent" class="clickable w-full bg-lime-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl mt-4">確認加入行程</button>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;
    createApp({
        setup() {
            const currentTab = ref('schedule');
            const showAddModal = ref(false);
            const showExpenseModal = ref(false);
            const currentDayIndex = ref(0);
            const exchangeRate = ref(0.024);
            const days = ref([{ events: [] }]);
            const expenses = ref([]);
            const tempEvent = ref({ type: 'spot', time: '12:00', location: '', origin: '', destination: '' });

            let map = null;

            const initMap = async () => {
                await nextTick();
                if (!map) {
                    map = L.map('schedule-map', { zoomControl: false, attributionControl: false }).setView([35.1796, 129.0756], 12);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
                }
            };

            const saveEvent = () => {
                days.value[currentDayIndex.value].events.push({ id: Date.now(), ...tempEvent.value });
                days.value[currentDayIndex.value].events.sort((a, b) => a.time.localeCompare(b.time));
                showAddModal.value = false;
                tempEvent.value = { type: 'spot', time: '12:00', location: '', origin: '', destination: '' };
            };

            const totalSpentKRW = computed(() => expenses.value.reduce((s, i) => s + i.amount, 0));

            onMounted(() => {
                const saved = localStorage.getItem('Busan_Trip_v3');
                if (saved) {
                    const p = JSON.parse(saved);
                    days.value = p.days || days.value;
                    expenses.value = p.expenses || [];
                }
                initMap();
            });

            watch([days, expenses], () => {
                localStorage.setItem('Busan_Trip_v3', JSON.stringify({ days: days.value, expenses: expenses.value }));
            }, { deep: true });

            return { 
                currentTab, showAddModal, showExpenseModal, currentDayIndex, days, tempEvent, 
                saveEvent, totalSpentKRW, exchangeRate,
                changeDay: (i) => { currentDayIndex.value = i; },
                addDay: () => days.value.push({ events: [] }),
                openAddModal: () => { showAddModal.value = true; },
                deleteEvent: (idx) => { days.value[currentDayIndex.value].events.splice(idx, 1); },
                refreshMap: () => { location.reload(); }
            };
        }
    }).mount('#app');
</script>
</body>
</html>
